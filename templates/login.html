<!DOCTYPE html>
<html>
<head>

<title>Login | Multimodal Education Creator</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#202020fb);
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container{

    background:#ffffff;
    padding:40px;
    width:350px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    text-align:center;
}

.login-container h2{
    margin-bottom:25px;
}

input{

    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:15px;
}

button{

    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#ff9800;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#e68900;
}

.footer{
    margin-top:20px;
    font-size:13px;
    color:#777;
}

</style>

</head>

<body>

<div class="login-container">

<h2>Multimodal Education Creator</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="footer">
AI Powered Learning Platform
</div>

</div>

</body>
</html>
